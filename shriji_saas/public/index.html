<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Shriji SaaS</title>

<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/editor.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">

</head>

<body>

<div class="container">

<!-- =========================
     🔷 TOPBAR
========================= -->

<div class="topbar">

    <div class="brand">

        🕉 Shriji IDE

    </div>

    <div class="file-tabs"
    id="tabsContainer">

    </div>

    <button id="newTabButton">

        + New File

    </button>

</div>

<!-- =========================
     🔥 MAIN LAYOUT
========================= -->

<div class="top-layout">

    <!-- =========================
         📁 LEFT SIDEBAR
    ========================= -->

    <div class="files">

<h3>📚 Examples</h3>

<div class="sidebar-section">

    <div class="sidebar-title">

        FAVORITES

    </div>

    <div class="sidebar-item">

        ⭐ Basic Math

    </div>

    <div class="sidebar-item">

        ⭐ Hello World

    </div>

</div>

<div class="sidebar-section">

    <div class="sidebar-title">

        RECENT

    </div>

    <div class="sidebar-item">

        🕒 Variables Demo

    </div>

    <div class="sidebar-item">

        🕒 Conditions

    </div>

</div>

<div class="sidebar-section">

    <div class="sidebar-title">

        FILES

    </div>

    <ul id="fileList">

        <li onclick="switchFile('main.shriji')">
            📄 main.shriji
        </li>

        <li onclick="switchFile('file2.shriji')">
            📄 file2.shriji
        </li>

        <li onclick="switchFile('file3.shriji')">
            📄 file3.shriji
        </li>

    </ul>

</div>

    </div>

    <!-- =========================
         🧠 EDITOR
    ========================= -->

    <div class="left">

        <h2 id="editorTitle">

         main.shriji

        </h2>

        <textarea id="code"></textarea>

        <br><br>

        <div class="button-row">

            <button onclick="saveFile()">

                💾 Save

            </button>

            <button
            id="runButton"
            onclick="runCode()">

                ▶ Run

            </button>

        </div>

    </div>

    <!-- =========================
         🌸 RIGHT PANEL
    ========================= -->

    <div class="right">

        <!-- OUTPUT -->

        <div class="panel output-panel">

            <h2>Output</h2>

            <div id="resultBox"></div>

            <div id="correctBox"></div>

            <div id="hintBox"></div>

        </div>

        <!-- EXPLAIN -->

        <div class="panel explain-panel">

            <h2>Explanation</h2>

            <div id="explainBox">

                Shriji language explanation panel.

            </div>

        </div>

    </div>

</div>

<!-- =========================
     🖥 DEBUG PANEL
========================= -->

<div class="bottom-panel">

    <!-- TABS -->

    <div class="console-tabs">

        <div class="console-tab active">

            Exceptions

        </div>

        <div class="console-tab">

            Runtime

        </div>

        <div class="console-tab">

            Logs

        </div>

        <div class="console-tab">

            Variables

        </div>

    </div>

    <!-- CONTENT -->

    <div class="console-content">

        🚀 Shriji Runtime Ready...

    </div>

</div>

</div>

<!-- =========================
     📦 SCRIPTS
========================= -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>

<script src="/js/runtime.js"></script>

<script src="/js/editor.js"></script>

<script src="/js/files.js"></script>

<script src="/js/app.js"></script>

<script src="/js/ui.js"></script>

</body>

</html>
